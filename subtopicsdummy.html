<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailed Subtopics | EcoVision</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="logo">EcoVision</div>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="environment.html">Environment</a></li>
                <li><a href="about.html">About Me</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="section-header">
            <h1>Exploration Directory</h1>
            <p>A comprehensive list of environmental sub-sectors and research topics.</p>
        </section>

        <section class="topics-list-container">
            <div class="topics-card">
                <nav class="vertical-links" id="topics-placeholder">
                    </nav>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 EcoVision. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>

    <script>
        /**
         * EDITABLE SECTION: 
         * Change 'name' for the display text and 'url' for the hyperlink.
         */
        const subtopicsData = [
            { name: "1. Arctic Permafrost Degradation", url: "vlog.html" },
            { name: "2. Deep-Sea Mining Regulations", url: "#" },
            { name: "3. Regenerative Viticulture Methods", url: "#" },
            { name: "4. Solid-State Battery Innovation", url: "#" },
            { name: "5. Urban Heat Island Mitigation", url: "#" },
            { name: "6. Mangrove Forest Restoration", url: "#" },
            { name: "7. Green Hydrogen Electrolysis", url: "#" },
            { name: "8. Sustainable Aviation Fuels (SAF)", url: "#" },
            { name: "9. Microplastic Filtration in Wastewater", url: "#" },
            { name: "10. Precision Agriculture via Satellite", url: "#" },
            { name: "11. Coral Reef Larval Enhancement", url: "#" },
            { name: "12. Circular Textile Supply Chains", url: "#" },
            { name: "13. Passive House Design Standards", url: "#" },
            { name: "14. Mycelium-Based Packaging Solutions", url: "#" },
            { name: "15. Carbon Capture and Sequestration (CCS)", url: "#" },
            { name: "16. Transboundary Water Management", url: "#" },
            { name: "17. Indigenous Land Stewardship", url: "#" },
            { name: "18. Vertical Hydroponic Farming", url: "#" },
            { name: "19. Biodiversity Credit Markets", url: "#" },
            { name: "20. E-Waste Urban Mining Tech", url: "#" }
        ];

        const container = document.getElementById('topics-placeholder');

        subtopicsData.forEach(topic => {
            const link = document.createElement('a');
            link.href = topic.url;
            link.className = 'topic-line-link';
            link.innerHTML = `
                <span class="topic-title">${topic.name}</span>
                <span class="topic-icon">→</span>
            `;
            container.appendChild(link);
        });
    </script>
</body>
</html>
