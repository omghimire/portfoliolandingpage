    <script src="script.js"></script>
    
    <script>
        /**
         * EDITABLE SECTION: 
         * Change the text within this array to update your 12 cards.
         */
        const cardData = [
            { title: "1. Climate Change & Global Warming ", summary: "जलवायु परिवर्तन र भूमण्डलीय तापक्रम वृद्धि", link: "subtopics.html" },
            { title: "2. Renewable & Sustainable Energy", summary: "नवीकरणीय र दिगो ऊर्जा", link: "topic2.html" },
            { title: "3. Biodiversity & Conservation", summary: "जैविक विविधता र संरक्षण", link: "topic3.html" },
            { title: "4. Water Security & Hydrology", summary: "जल सुरक्षा र जलविद्युत", link: "topic4.html" },
            { title: "5. Waste Management & Circular Economy", summary: "फोहोरमैला व्यवस्थापन र चक्रिय अर्थतन्त्र", link: "topic5.html" },
            { title: "6. Sustainable Agriculture & Food Systems", summary: "दिगो कृषि र खाद्य प्रणाली", link: "topic6.html" },
            { title: "7. Air Quality & Atmospheric Science", summary: "वायुको गुणस्तर र वायुमण्डलीय विज्ञान", link: "topic7.html" },
            { title: "8. Forest & Terrestrial Ecosystems", summary: "वन र स्थलीय पारिस्थितिक प्रणाली", link: "topic8.html" },

        ];

        // LOGIC TO RENDER CARDS
        const container = document.getElementById('editable-card-container');
        
        cardData.forEach((item, index) => {
            const cardHTML = `
                <article class="card">
                    <div class="img-placeholder">Topic ${index + 1}</div>
                    <div class="card-body">
                        <h3>${item.title}</h3>
                        <p class="justified">${item.summary}</p>
                        <a href="${item.link}" class="btn btn-card">To the topic</a>
                    </div>
                </article>
            `;
            container.innerHTML += cardHTML;
        });
    </script>
