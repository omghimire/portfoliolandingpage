<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environment | Topics</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="logo">EcoVision</div>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="environment.html" class="active">Environment</a></li>
                <li><a href="about.html">About Me</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </nav>
    </header>

    <main class="container">
        <header class="section-header">
            <h1>Environmental Insights</h1>
            <p>12 Pillars of Sustainability</p>
        </header>

        <section class="grid-layout" id="editable-card-container"></section>
    </main>

    <footer>
        <p>&copy; 2026 EcoVision. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    
    <script>
        /**
         * EDITABLE SECTION: 
         * Change the text within this array to update your 12 cards.
         */
        const cardData = [
            { title: "Renewable Energy", summary: "Solar and wind power are leading the transition toward a zero-carbon power grid globally.", link: "subtopics.html" },
            { title: "Ocean Plastic", summary: "Reducing single-use plastics is vital for protecting marine biodiversity and coastal health.", link: "topic2.html" },
            { title: "Reforestation", summary: "Planting native trees helps sequester carbon and restores habitats lost to industrialization.", link: "topic3.html" },
            { title: "Urban Farming", summary: "Growing food within city limits reduces transportation emissions and improves food security.", link: "topic4.html" },
            { title: "Electric Vehicles", summary: "The shift to EVs is a cornerstone of reducing urban air pollution and fossil fuel reliance.", link: "topic5.html" },
            { title: "Water Scarcity", summary: "Innovative desalination and recycling methods are required to combat global water shortages.", link: "topic6.html" },
            { title: "Circular Economy", summary: "Moving away from 'take-make-waste' toward a system where materials are reused indefinitely.", link: "topic7.html" },
            { title: "Sustainable Fashion", summary: "Addressing the high water usage and chemical runoff associated with the global textile industry.", link: "topic8.html" },
            { title: "Green Building", summary: "Using eco-friendly materials and passive heating designs to reduce residential energy consumption.", link: "topic9.html" },
            { title: "Wildlife Corridors", summary: "Connecting fragmented habitats allows species to migrate safely across human-made barriers.", link: "topic10.html" },
            { title: "Soil Health", summary: "Regenerative agriculture practices restore the nutrients in our earth and improve crop yield.", link: "topic11.html" },
            { title: "Arctic Ice Melt", summary: "Monitoring the rapid changes in polar regions that influence global weather patterns.", link: "topic12.html" }
        ];

        // LOGIC TO RENDER CARDS
        const container = document.getElementById('editable-card-container');
        
        cardData.forEach((item, index) => {
            const cardHTML = `
                <article class="card">
                    <div class="img-placeholder">Topic ${index + 1}</div>
                    <div class="card-body">
                        <h3>${item.title}</h3>
                        <p class="justified">${item.summary}</p>
                        <a href="${item.link}" class="btn btn-card">To the topic</a>
                    </div>
                </article>
            `;
            container.innerHTML += cardHTML;
        });
    </script>
</body>
</html>
